<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>DataPlotter Pro for Research</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-muted: #64748b;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --radius: 6px;
    --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
  }

  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    margin: 0;
    padding: 32px;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  .container { max-width: 1100px; margin: 0 auto; }
  
  header { margin-bottom: 32px; border-bottom: 2px solid var(--border); padding-bottom: 16px; }
  h1 { margin: 0; font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.025em; }
  .subtitle { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

  .layout { display: grid; grid-template-columns: 1fr 340px; gap: 24px; }
  @media (max-width: 950px) { .layout { grid-template-columns: 1fr; } }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 24px;
  }

  /* File Drop Area */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    background: #fdfdfd;
    transition: all 0.2s;
    cursor: pointer;
    margin-bottom: 24px;
  }
  .drop-zone.dragover { border-color: var(--primary); background: #eff6ff; }
  .btn-upload {
    display: inline-block;
    padding: 8px 16px;
    background: var(--primary);
    color: white;
    border-radius: 4px;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
  }
  input[type=file] { display: none; }

  /* Forms */
  .form-grid { display: grid; gap: 16px; margin-top: 8px; }
  .section-label { 
    font-size: 12px; font-weight: 600; color: var(--text-muted); 
    text-transform: uppercase; letter-spacing: 0.05em; 
    margin-top: 16px; border-bottom: 1px solid var(--border); padding-bottom: 4px;
  }
  
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 13px; font-weight: 500; color: var(--text); }
  
  input, select {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 14px;
    color: var(--text);
    background: #fff;
  }
  input:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Actions */
  .actions { display: flex; gap: 12px; margin-top: 32px; }
  button {
    flex: 1;
    padding: 10px 16px;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .btn-main { background: var(--primary); color: white; }
  .btn-main:hover { background: var(--primary-hover); }
  .btn-sub { background: white; border-color: var(--border); color: var(--text); }
  .btn-sub:hover { background: #f8fafc; border-color: #cbd5e1; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Chart & Preview */
  .chart-wrap { margin-top: 32px; }
  .canvas-container { height: 450px; position: relative; }
  
  .preview-section { 
    margin-top: 32px; padding-top: 24px; border-top: 1px dotted var(--border); 
  }
  .preview-img { width: 100%; border-radius: 4px; border: 1px solid var(--border); margin-top: 12px; }

  .error { color: #be123c; font-size: 13px; font-weight: 500; margin-top: 8px; }
  .info-text { font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Research+</h1>
  </header>

  <div class="layout">
    <main>
      <div class="card">
        <div class="drop-zone" id="dropArea">
          <div style="font-size: 15px; margin-bottom: 12px; color: var(--text-muted);">解析するCSVファイルを入れてね</div>
          <label class="btn-upload">ファイルを選択しようね<input id="fileInput" type="file" accept=".csv" /></label>
          <div id="fileInfo" class="info-text" style="margin-top: 12px;"></div>
          <div id="errMsg" class="error"></div>
        </div>

        <div class="section-label">グラフ設定だよ</div>
        <div class="form-grid">
          <div class="input-group">
            <label>タイトル</label>
            <input type="text" id="titleInput" placeholder="Graph Title">
          </div>
          <div class="row">
            <div class="input-group">
              <label>凡例名</label>
              <input type="text" id="legendInput" value="温度 (°C)">
            </div>
            <div class="input-group">
              <label>データ列 (Y軸)</label>
              <select id="tempColSelect"></select>
            </div>
          </div>
        </div>

        <div class="section-label">軸設定</div>
        <div class="form-grid">
          <div class="row">
            <div class="input-group">
              <label>時間列 (X軸/秒)</label>
              <select id="timeColSelect"></select>
            </div>
            <div class="input-group">
              <label>Index列</label>
              <select id="indexColSelect"></select>
            </div>
          </div>
          <div class="input-group" style="flex-direction: row; align-items: center; gap: 8px;">
            <input type="checkbox" id="useIndexAsTime" style="width: auto;">
            <label for="useIndexAsTime" style="margin: 0;">Index列を秒数として使用</label>
          </div>
          <div class="row">
            <div class="input-group"><label>開始秒</label><input type="number" id="startSec" step="any" placeholder="Auto"></div>
            <div class="input-group"><label>終了秒</label><input type="number" id="endSec" step="any" placeholder="Auto"></div>
          </div>
          <div class="row">
            <div class="input-group">
              <label>X軸目盛り間隔 (分)</label>
              <select id="tickIntervalSelect">
                <option value="0.5">0.5分 (30秒)</option>
                <option value="1" selected>1分</option>
                <option value="2">2分</option>
                <option value="5">5分</option>
                <option value="10">10分</option>
              </select>
            </div>
            <div class="input-group">
              <label>Y軸レンジ</label>
              <select id="yAutoSelect">
                <option value="auto">自動</option>
                <option value="manual">手動</option>
              </select>
            </div>
          </div>
          <div id="yManualRow" class="row" style="display:none">
            <div class="input-group"><label>Y軸最小値</label><input type="number" id="yMin" step="any"></div>
            <div class="input-group"><label>Y軸最大値</label><input type="number" id="yMax" step="any"></div>
          </div>
        </div>

        <div class="section-label">記録情報</div>
        <div class="row">
          <div class="input-group"><label>実験日</label><input type="date" id="expDate"></div>
          <div class="input-group"><label>外気温 (°C)</label><input type="number" id="ambientTemp" step="any"></div>
        </div>

        <div class="actions">
          <button id="plotBtn" class="btn-main">グラフ生成</button>
          <button id="downloadPNG" class="btn-sub" disabled>画像保存 (PNG)</button>
          <button id="exportCSV" class="btn-sub" disabled>CSV抽出</button>
        </div>

        <div class="chart-wrap">
          <div class="canvas-container">
            <canvas id="chart"></canvas>
          </div>
        </div>

        <div id="previewWrap" class="preview-section" style="display:none">
          <label style="color: var(--text-muted);">エクスポート用プレビュー (iPadは長押し保存)</label>
          <img id="chartImage" class="preview-img" alt="Chart Output" />
        </div>
      </div>
    </main>

    <aside>
      <div class="card" style="padding: 16px;">
        <h3 style="font-size: 14px; margin-top: 0; color: var(--text);">解析ガイド</h3>
        <ul style="font-size: 13px; color: var(--text-muted); padding-left: 18px;">
          <li>ファイル読み込み時に、タイトルはファイル名に自動更新されます。</li>
          <li>X軸は内部で秒から分に変換してプロットされます。</li>
          <li>研究発表用には「PNG保存」を使用して高精細な画像を取得してください。</li>
        </ul>
      </div>
    </aside>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>
(() => {
  const dropArea = document.getElementById('dropArea');
  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const errMsg = document.getElementById('errMsg');
  const timeColSelect = document.getElementById('timeColSelect');
  const tempColSelect = document.getElementById('tempColSelect');
  const indexColSelect = document.getElementById('indexColSelect');
  const useIndexAsTime = document.getElementById('useIndexAsTime');
  const startSecInput = document.getElementById('startSec');
  const endSecInput = document.getElementById('endSec');
  const yMinInput = document.getElementById('yMin');
  const yMaxInput = document.getElementById('yMax');
  const titleInput = document.getElementById('titleInput');
  const legendInput = document.getElementById('legendInput');
  const plotBtn = document.getElementById('plotBtn');
  const downloadPNG = document.getElementById('downloadPNG');
  const exportCSV = document.getElementById('exportCSV');
  const ctx = document.getElementById('chart').getContext('2d');
  const expDateInput = document.getElementById('expDate');
  const ambientTempInput = document.getElementById('ambientTemp');
  const previewWrap = document.getElementById('previewWrap');
  const chartImage = document.getElementById('chartImage');
  const tickIntervalSelect = document.getElementById('tickIntervalSelect');
  const yAutoSelect = document.getElementById('yAutoSelect');
  const yManualRow = document.getElementById('yManualRow');

  let parsedData = null;
  let chartInstance = null;

  ['dragenter','dragover','dragleave','drop'].forEach(ev => {
    dropArea.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); });
  });
  ['dragenter','dragover'].forEach(ev => dropArea.addEventListener(ev, ()=> dropArea.classList.add('dragover')));
  ['dragleave','drop'].forEach(ev => dropArea.addEventListener(ev, ()=> dropArea.classList.remove('dragover')));
  
  dropArea.addEventListener('drop', e => {
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) handleFile(f);
  });
  fileInput.addEventListener('change', e => {
    const f = e.target.files && e.target.files[0];
    if (f) handleFile(f);
  });

  yAutoSelect.addEventListener('change', (e) => {
    yManualRow.style.display = e.target.value === 'manual' ? 'grid' : 'none';
  });

  function handleFile(file){
    if (!file.name.toLowerCase().endsWith('.csv')) { 
      errMsg.textContent = 'CSV形式のみ対応しています'; return; 
    }
    errMsg.textContent = '';
    titleInput.value = file.name.replace(/\.csv$/i,'');
    fileInfo.textContent = `${file.name} を読込中...`;

    Papa.parse(file, {
      header: false,
      complete: (results) => {
        const rows = results.data.filter(r => r.length > 1);
        let headerIdx = 0;
        const keywords = ['time','index','秒','temp','温度'];
        for (let i=0; i<Math.min(10, rows.length); i++){
          if (rows[i].some(c => keywords.some(k => (''+c).toLowerCase().includes(k)))) {
            headerIdx = i; break;
          }
        }
        const header = rows[headerIdx].map(c => (''+c).trim());
        const data = rows.slice(headerIdx + 1).map(r => {
          const o = {};
          header.forEach((h, i) => o[h] = r[i]);
          return o;
        });
        parsedData = { header, data };
        fileInfo.textContent = `${file.name} (データ数: ${data.length})`;
        initSelectors(header);
      }
    });
  }

  function initSelectors(fields){
    [timeColSelect, tempColSelect, indexColSelect].forEach(s => {
      s.innerHTML = '';
      fields.forEach(f => {
        const o = document.createElement('option');
        o.value = f; o.textContent = f;
        s.appendChild(o);
      });
    });
    const low = fields.map(f => f.toLowerCase());
    timeColSelect.selectedIndex = Math.max(0, low.findIndex(f => /time|秒/.test(f)));
    tempColSelect.selectedIndex = Math.max(0, low.findIndex(f => /temp|温度|℃/.test(f)));
    indexColSelect.selectedIndex = Math.max(0, low.findIndex(f => /index|idx|no/.test(f)));
    
    // Auto-range initial
    const firstColData = parsedData.data.map(r => parseFloat(r[timeColSelect.value])).filter(v => !isNaN(v));
    if (firstColData.length) {
      startSecInput.value = Math.min(...firstColData);
      endSecInput.value = Math.max(...firstColData);
    }
  }

  plotBtn.addEventListener('click', () => {
    if (!parsedData) return;
    const tCol = useIndexAsTime.checked ? indexColSelect.value : timeColSelect.value;
    const pCol = tempColSelect.value;
    const start = parseFloat(startSecInput.value) || 0;
    const end = parseFloat(endSecInput.value) || Infinity;

    const filtered = parsedData.data
      .map(r => ({ x: parseFloat(r[tCol]), y: parseFloat(r[pCol]) }))
      .filter(d => !isNaN(d.x) && !isNaN(d.y) && d.x >= start && d.x <= end)
      .map(d => ({ x: d.x / 60, y: d.y })); // 秒を分に変換

    if (chartInstance) chartInstance.destroy();
    
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        datasets: [{
          label: legendInput.value,
          data: filtered,
          borderColor: '#2563eb',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          title: { display: true, text: titleInput.value, font: { size: 16, weight: '600' }, color: '#1e293b' },
          legend: { position: 'top', labels: { font: { size: 12 } } }
        },
        scales: {
          x: { 
            type: 'linear', 
            title: { display: true, text: 'Time (minutes)', font: { size: 13, weight: '500' } },
            ticks: { stepSize: parseFloat(tickIntervalSelect.value) }
          },
          y: { 
            title: { display: true, text: legendInput.value, font: { size: 13, weight: '500' } },
            min: yAutoSelect.value === 'manual' ? parseFloat(yMinInput.value) : undefined,
            max: yAutoSelect.value === 'manual' ? parseFloat(yMaxInput.value) : undefined
          }
        }
      }
    });

    downloadPNG.disabled = false;
    exportCSV.disabled = false;
    previewWrap.style.display = 'none';
  });

  downloadPNG.addEventListener('click', () => {
    if (!chartInstance) return;
    const chartCanvas = document.getElementById('chart');
    const ratio = window.devicePixelRatio || 1;
    
    const outCanvas = document.createElement('canvas');
    const metaNeeded = (expDateInput.value || ambientTempInput.value);
    const metaHeight = metaNeeded ? 50 : 0;
    
    outCanvas.width = chartCanvas.width;
    outCanvas.height = chartCanvas.height + (metaHeight * ratio);
    const outCtx = outCanvas.getContext('2d');
    
    outCtx.fillStyle = '#ffffff';
    outCtx.fillRect(0, 0, outCanvas.width, outCanvas.height);
    
    const img = new Image();
    img.onload = () => {
      outCtx.drawImage(img, 0, 0);
      if (metaNeeded) {
        outCtx.fillStyle = '#64748b';
        outCtx.font = `${12 * ratio}px sans-serif`;
        let text = '';
        if (expDateInput.value) text += `Date: ${expDateInput.value}  `;
        if (ambientTempInput.value) text += `Ambient: ${ambientTempInput.value} °C`;
        outCtx.fillText(text, 20 * ratio, chartCanvas.height + (25 * ratio));
      }
      const dataUrl = outCanvas.toDataURL('image/png');
      chartImage.src = dataUrl;
      previewWrap.style.display = 'block';
      
      const link = document.createElement('a');
      link.href = dataUrl;
      link.download = `${titleInput.value || 'graph'}.png`;
      link.click();
    };
    img.src = chartCanvas.toDataURL('image/png');
  });

  exportCSV.addEventListener('click', () => {
    if (!chartInstance) return;
    const data = chartInstance.data.datasets[0].data;
    const csv = 'Time(min),' + legendInput.value + '\n' + data.map(d => `${d.x},${d.y}`).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${titleInput.value}_extracted.csv`;
    a.click();
  });
})();
</script>
</body>
</html>
