<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Research+ DataPlotter Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="wizard-container">

    <!-- Header & Progress -->
    <header>
      <h1>Research+ Pro</h1>
      <div class="step-indicator">
        <div class="step active" id="step1-indicator">
          <div class="step-num">1</div>
          <div class="step-label">データ読込</div>
        </div>
        <div class="step" id="step2-indicator">
          <div class="step-num">2</div>
          <div class="step-label">グラフ設定</div>
        </div>
        <div class="step" id="step3-indicator">
          <div class="step-num">3</div>
          <div class="step-label">完了・保存</div>
        </div>
      </div>
    </header>

    <!-- Wizard Body area -->
    <div class="wizard-body">

      <!-- Step 1: Import -->
      <div class="step-content active" id="step1">
        <div class="drop-zone" id="dropArea">
          <input id="fileInput" type="file" accept=".csv, .txt" multiple />
          <div class="drop-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" x2="12" y1="3" y2="15" />
            </svg></div>
          <div class="drop-text">CSV または TXT ファイルを ここへドラッグ＆ドロップ</div>
          <div class="drop-subtext">複数のファイルを選択して一括で重ね合わせられます。</div>
        </div>

        <div class="datasets-list" id="datasetsList">
          <!-- Dataset cards injected here -->
        </div>
      </div>

      <!-- Step 2: Settings -->
      <div class="step-content" id="step2">
        <div class="settings-grid">

          <!-- Left Column -->
          <div>
            <h3 class="section-title">基本設定</h3>
            <div class="input-group">
              <label>全体のグラフタイトル</label>
              <input type="text" id="globalTitle" placeholder="マクロファージ応答解析など">
            </div>
            <div class="input-group">
              <label>縦軸（Y軸）のラベル</label>
              <input type="text" id="yAxisLabel" value="温度（℃）" placeholder="例: 電圧 (mV)">
            </div>
            <div class="input-row">
              <div class="input-group"><label>開始時間 (秒)</label><input type="number" id="startSec" step="any"
                  placeholder="Auto"></div>
              <div class="input-group"><label>終了時間 (秒)</label><input type="number" id="endSec" step="any"
                  placeholder="Auto"></div>
            </div>
            <div class="input-group">
              <label>X軸（時間/分）の目盛り間隔</label>
              <select id="xAxisInterval">
                <option value="0.5">0.5分間隔</option>
                <option value="1" selected>1分間隔</option>
                <option value="2">2分間隔</option>
                <option value="5">5分間隔</option>
                <option value="10">10分間隔</option>
                <option value="auto">自動おまかせ</option>
              </select>
            </div>
          </div>

          <!-- Right Column -->
          <div>
            <h3 class="section-title">高度な解析オプション</h3>

            <div class="toggle-wrap">
              <div class="toggle-label"><span>データの正規化 (Min-Max)</span><span class="toggle-desc">0〜1の割合で波形の形だけを比較</span>
              </div>
              <label class="switch"><input type="checkbox" id="useNorm"><span class="slider"></span></label>
            </div>

            <div class="toggle-wrap">
              <div class="toggle-label"><span>波形の平滑化 (移動平均)</span><span class="toggle-desc">ノイズを取り除く</span></div>
              <label class="switch"><input type="checkbox" id="useMA"><span class="slider"></span></label>
            </div>
            <div class="range-wrap hidden" id="maSettings">
              <div class="range-header"><span>ウィンドウサイズ</span><span id="maValue"
                  style="font-weight:700; color:var(--primary);">5</span></div>
              <input type="range" id="maWindow" min="2" max="50" value="5">
            </div>

            <div class="toggle-wrap">
              <div class="toggle-label"><span>対数Y軸 (Log Scale)</span><span class="toggle-desc">桁数が全く違うデータの比較に</span>
              </div>
              <label class="switch"><input type="checkbox" id="useLogY"><span class="slider"></span></label>
            </div>

            <div class="toggle-wrap">
              <div class="toggle-label"><span>ポイント表示</span><span class="toggle-desc">ホバーして正確な数値を確認</span></div>
              <label class="switch"><input type="checkbox" id="showPoints"><span class="slider"></span></label>
            </div>
          </div>
        </div>
      </div>

      <!-- Step 3: Result Chart -->
      <div class="step-content" id="step3">
        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 12px;">
          <h3 class="section-title" style="margin:0;">解析完了</h3>
          <div style="display:flex; gap:12px;">
            <button id="downloadPNG" class="btn btn-secondary" style="padding: 10px 20px; font-size:13px;">画像を保存
              (PNG)</button>
            <button id="exportCSV" class="btn btn-secondary"
              style="padding: 10px 20px; font-size:13px;">結合済CSVを抽出</button>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="chart"></canvas>
        </div>
        <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top: 16px;">
          💡 グラフ上でのマウスホイールで拡大縮小、ドラッグで移動が可能です。
        </p>
      </div>

    </div> <!-- /wizard-body -->

    <!-- Footer Navigation -->
    <footer>
      <button class="btn btn-secondary hidden" id="btnBack">&larr; 戻る</button>
      <div style="flex:1;"></div>
      <button class="btn btn-primary" id="btnNext" disabled>グラフ設定へ <span style="font-size:18px;">&rarr;</span></button>
    </footer>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <script src="app.js"></script>

</body>

</html>
